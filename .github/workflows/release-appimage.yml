name: Build AppImage

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential desktop-file-utils

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool.AppImage
          chmod +x appimagetool.AppImage

      - name: Build AppImage
        env:
          VERSION: ${{ github.ref_name }}
          APPIMAGETOOL_BIN: ${{ github.workspace }}/appimagetool.AppImage
        run: |
          if [[ "${VERSION}" == "" || "${VERSION}" == "main" ]]; then
            VERSION="0.1.1"
          fi
          VERSION="${VERSION#v}"
          chmod +x scripts/package/build_appimage.sh
          scripts/package/build_appimage.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zblz-engine-appimage
          path: dist/*.AppImage

      - name: Upload to GitHub Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
